# One container serves both hosts from the same static build.
# Traefik (Dokploy) terminates TLS and forwards the original Host header,
# so nginx routes by server_name.

# --- nmrp.dev — the marketing site ----------------------------------------
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}

# --- docs.nmrp.dev — the documentation ------------------------------------
server {
    listen 80;
    server_name docs.nmrp.dev;

    root /usr/share/nginx/html;
    error_page 404 /404.html;

    # The docs live at the domain root; the bare host lands on the intro page.
    location = /    { return 302 /introduction; }
    location = /en  { return 302 /en/introduction; }
    location = /en/ { return 302 /en/introduction; }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
