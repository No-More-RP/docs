# One container serves both hosts from the same static build.
# Traefik (Dokploy) terminates TLS and forwards the original Host header,
# so nginx routes by server_name.

# Security headers are added per server block below. The CSP is intentionally
# "light": inline scripts/styles are needed by Astro; images allow GitHub
# avatars; connect allows the GitHub API (contributors are fetched client-side).

# --- nmrp.dev — the marketing site ----------------------------------------
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    error_page 404 /404.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://avatars.githubusercontent.com; connect-src 'self' https://api.github.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'" always;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}

# --- docs.nmrp.dev — the documentation ------------------------------------
server {
    listen 80;
    server_name docs.nmrp.dev;

    root /usr/share/nginx/html;
    error_page 404 /404.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://avatars.githubusercontent.com; connect-src 'self' https://api.github.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'" always;

    # The docs live at the domain root; the bare host lands on the intro page.
    location = /    { return 302 /introduction; }
    location = /en  { return 302 /en/introduction; }
    location = /en/ { return 302 /en/introduction; }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
